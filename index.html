
<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chaotic Beauty</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

body {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  color: #e8ddd0;
  overflow-x: hidden;
  background-color: #2b1d14;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

.vignette {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%,   rgba(90,50,20,0.4)  0%, transparent 55%),
    radial-gradient(ellipse at 0%   50%,  rgba(20,8,3,0.65)   0%, transparent 50%),
    radial-gradient(ellipse at 100% 50%,  rgba(15,6,2,0.65)   0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%,  rgba(10,4,1,0.8)    0%, transparent 55%);
  pointer-events: none;
  z-index: -1;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.4rem 3rem;
  background: linear-gradient(to bottom, rgba(22,12,7,0.92), transparent);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #f0e6d3;
}

.nav-links { display: flex; gap: 2.5rem; list-style: none; }

.nav-links a {
  color: #a89080;
  text-decoration: none;
  font-size: 0.67rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  transition: color 0.3s;
}
.nav-links a:hover { color: #f0e6d3; }

.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 8rem 5vw 5rem;
  gap: 3rem;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.8rem, 8.5vw, 7.5rem);
  font-weight: 300;
  line-height: 0.92;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #f0e6d3;
  margin-bottom: 1.5rem;
}

.hero-sub {
  font-size: 0.74rem;
  letter-spacing: 0.1em;
  color: #c5b8ac;
  line-height: 2;
  margin-bottom: 2.4rem;
  text-align: center;
}

.hero-buttons { display: flex; gap: 0.85rem; flex-wrap: wrap; }

.btn {
  display: inline-block;
  padding: 0.58rem 1.35rem;
  font-family: 'Raleway', sans-serif;
  font-size: 0.64rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid rgba(190,155,110,0.5);
  background: transparent;
  color: #f0e6d3;
}
.btn:hover { background: rgba(190,155,110,0.18); }

.hero-image-wrap img {
  width: 100%;
  height: clamp(340px, 52vh, 510px);
  object-fit: cover;
  object-position: top center;
}

.work-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}

.work-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

footer {
  border-top: 1px solid rgba(190,155,110,0.18);
  padding: 2rem 4vw;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

@media (max-width: 768px) {
  .hero {
    grid-template-columns: 1fr;
    padding: 6rem 1.5rem 3rem;
  }

  .work-grid { grid-template-columns: repeat(2, 1fr); }
}
  </style>
</head>

<body>

<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>

<nav>
  <div class="nav-logo">Chaotic Beauty</div>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#artists">Artists</a></li>
    <li><a href="#book">Book</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1 class="hero-title">Chaotic<br>Beauty</h1>
    <p class="hero-sub">Two artists. One vision.<br>Where beauty and chaos meet with intention.</p>
    <div class="hero-buttons">
      <a href="#book" class="btn">Book with Dev</a>
      <a href="#book" class="btn">Book with Jackie</a>
    </div>
  </div>

  <div class="hero-image-wrap">
    <img
      src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=900&q=85&fit=crop&crop=top"
      alt="Dev and Jackie — Chaotic Beauty"
    />
  </div>
</section>

<section class="work" id="work">
  <div class="work-grid">
    <div class="work-item">
      <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=700&q=80&fit=crop&crop=top" />
    </div>
    <div class="work-item">
      <img src="https://images.unsplash.com/photo-1634449571010-02389ed0f9b0?w=700&q=80&fit=crop&crop=top" />
    </div>
    <div class="work-item">
      <img src="https://images.unsplash.com/photo-1519699047748-de8e457a634e?w=700&q=80&fit=crop&crop=top" />
    </div>
    <div class="work-item">
      <img src="https://images.unsplash.com/photo-1492106087820-71f1a00d2b11?w=700&q=80&fit=crop&crop=top" />
    </div>
  </div>
</section>

<section id="book" style="text-align:center;padding:4rem 2rem;">
  <h2 style="font-family:'Cormorant Garamond',serif;font-weight:300;margin-bottom:1rem;">
    Ready to experience intentional chaos?
  </h2>
  <a href="#" class="btn">Book Now</a>
</section>

<footer>
  <div>Chaotic Beauty</div>
  <div>© 2025 Chaotic Beauty</div>
</footer>

</body>
</html>
