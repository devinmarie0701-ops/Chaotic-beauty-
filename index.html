<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaotic Beauty</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:
        radial-gradient(circle at top, rgba(92,58,37,.35), transparent 40%),
        linear-gradient(180deg, #1b120d 0%, #120c09 100%);
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:24px;
    }
    .wrap{
      width:min(100%, 1200px);
      display:flex;
      justify-content:center;
    }
    .mockup{
      width:100%;
      max-width:1100px;
      height:auto;
      display:block;
      box-shadow:0 24px 60px rgba(0,0,0,.4);
      border-radius:2px;
    }
    @media (max-width: 768px){
      body{padding:0;background:#120c09}
      .wrap{width:100%}
      .mockup{
        width:100%;
        max-width:none;
        box-shadow:none;
        border-radius:0;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="mockup" src="mockup-site.jpg" alt="Chaotic Beauty website mockup" />
  </main>
</body>
</html>
